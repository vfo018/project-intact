{{- if .Values.attackSimulator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intact-kafka-tools.fullname" . }}-attack-simulator
  labels:
    {{- include "intact-kafka-tools.labels" . | nindent 4 }}
    app.kubernetes.io/component: attack-simulator
spec:
  replicas: {{ .Values.attackSimulator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "intact-kafka-tools.name" . }}
      app.kubernetes.io/component: attack-simulator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "intact-kafka-tools.name" . }}
        app.kubernetes.io/component: attack-simulator
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: attack-simulator
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.global.kafkaBootstrapServers | quote }}
            - name: MODE
              value: {{ .Values.attackSimulator.env.MODE | quote }}
            - name: TOPIC
              value: {{ .Values.attackSimulator.env.TOPIC | quote }}
            - name: CLIENT_ID
              value: {{ .Values.attackSimulator.env.CLIENT_ID | quote }}
            - name: SLEEP_MIN
              value: {{ .Values.attackSimulator.env.SLEEP_MIN | quote }}
            - name: SLEEP_MAX
              value: {{ .Values.attackSimulator.env.SLEEP_MAX | quote }}
            - name: SRC_IP
              value: {{ .Values.attackSimulator.env.SRC_IP | quote }}
            - name: DST_IP
              value: {{ .Values.attackSimulator.env.DST_IP | quote }}
            - name: PROBE_ID
              value: {{ .Values.attackSimulator.env.PROBE_ID | quote }}
            - name: PROBE_NAME
              value: {{ .Values.attackSimulator.env.PROBE_NAME | quote }}
          resources:
            {{- toYaml .Values.attackSimulator.resources | nindent 12 }}
{{- end }}
