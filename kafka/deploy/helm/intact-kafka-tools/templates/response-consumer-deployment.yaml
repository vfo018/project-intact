{{- if .Values.responseConsumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intact-kafka-tools.fullname" . }}-response-consumer
  labels:
    {{- include "intact-kafka-tools.labels" . | nindent 4 }}
    app.kubernetes.io/component: response-consumer
spec:
  replicas: {{ .Values.responseConsumer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "intact-kafka-tools.name" . }}
      app.kubernetes.io/component: response-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "intact-kafka-tools.name" . }}
        app.kubernetes.io/component: response-consumer
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: response-consumer
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.global.kafkaBootstrapServers | quote }}
            - name: MODE
              value: {{ .Values.responseConsumer.env.MODE | quote }}
            - name: TOPIC
              value: {{ .Values.responseConsumer.env.TOPIC | quote }}
            - name: GROUP_ID
              value: {{ .Values.responseConsumer.env.GROUP_ID | quote }}
            - name: CLIENT_ID
              value: {{ .Values.responseConsumer.env.CLIENT_ID | quote }}
            - name: AUTO_OFFSET_RESET
              value: {{ .Values.responseConsumer.env.AUTO_OFFSET_RESET | quote }}
          resources:
            {{- toYaml .Values.responseConsumer.resources | nindent 12 }}
{{- end }}
